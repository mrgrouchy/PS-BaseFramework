name: PowerShell CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint-and-parse:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Parse check
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          $code = Get-Content -Raw -Path .\main.ps1
          [System.Management.Automation.Language.Parser]::ParseInput($code,[ref]$tokens,[ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          $issues = Invoke-ScriptAnalyzer -Path .\main.ps1 -Severity Error,Warning
          if ($issues) {
            $issues | Format-Table -AutoSize | Out-String | Write-Host
            exit 1
          }
